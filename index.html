<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coco Fresh - Tarjeta Digital</title>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <style>
        :root { --coco-green: #2d5a27; --coco-yellow: #f4e842; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: linear-gradient(to bottom, #87CEEB, #ffffff); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; text-align: center; position: relative; }
        .header { background: url('https://i.imgur.com/tu-logo-extraido.png') no-repeat center; background-size: cover; height: 200px; }
        .content { padding: 20px; }
        .title { color: var(--coco-green); font-size: 28px; font-weight: bold; margin: 10px 0; }
        .slogan { italic; color: #555; margin-bottom: 20px; }
        .btn { display: block; margin: 10px 0; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-ws { background: #25d366; color: white; }
        .btn-call { background: #007bff; color: white; }
        .btn-map { background: #ff5722; color: white; }
        .footer { font-size: 10px; padding: 15px; color: #777; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="header">
        </div>
    <div class="content">
        <div class="title">COCO FRESH</div>
        <div class="slogan">"El dulce sabor del coco"</div>
        
        <a href="https://wa.me/573153080312" class="btn btn-ws">Escríbenos por WhatsApp</a>
        <a href="tel:+573153080312" class="btn btn-call">Llamar Ahora</a>
        <a href="https://www.google.com/maps/search/Parque+las+banderas+frente+a+la+Alcaldia" class="btn btn-map">Ver Ubicación</a>
    </div>

    <div class="footer">
        APP DESARROLLADA POR VIBRAS POSITIVAS (3117700431) <br>
        © Todos los derechos reservados 2026
    </div>
</div>

<script>
    // Control de suscripción invisible
    const fechaVencimiento = new Date('2027-03-16');
    const hoy = new Date();
    if (hoy > fechaVencimiento) {
        document.getElementById('mainCard').innerHTML = "<h1>Suscripción Vencida</h1><p>Contacte a Vibras Positivas para renovar.</p>";
    }
</script>

</body>
</html>
